<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secure Web Gateway</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: #181825;
      border-bottom: 1px solid #313244;
    }
    #url-input {
      flex: 1;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #45475a;
      background: #313244;
      color: #cdd6f4;
      font-size: 14px;
      outline: none;
    }
    #url-input:focus { border-color: #89b4fa; }
    button {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      background: #45475a;
      color: #cdd6f4;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #585b70; }
    #status {
      font-size: 11px;
      padding: 2px 12px;
      color: #6c7086;
      background: #181825;
      border-bottom: 1px solid #313244;
    }
    #content-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6c7086;
    }
    #browser-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <input
      id="url-input"
      type="text"
      placeholder="Enter URL or search…"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <button id="go-btn">Go</button>
  </div>
  <div id="status">Ready</div>
  <div id="content-area">
    <iframe id="browser-frame"></iframe>
  </div>

  <script>
    const input  = document.getElementById('url-input');
    const goBtn  = document.getElementById('go-btn');
    const status = document.getElementById('status');

    async function navigate() {
      const raw = input.value
        .replace(/[\x00-\x1F\x7F]/g, '')
        .trim();

      if (!raw) return;

      status.textContent = 'Sending to Rust for validation…';

      const encoded = encodeURIComponent(raw);
      const ipcUrl  = `http://ipc.localhost/navigate?q=${encoded}`;

      console.log('[JS] Raw input:', raw);
      console.log('[JS] IPC URL:',  ipcUrl);

      try {
        const resp = await fetch(ipcUrl);

        if (resp.ok) {
          status.textContent = 'Navigating…';
        } else {
          status.textContent = `Error: Rust rejected the request (${resp.status})`;
          console.error('[JS] IPC request rejected, status:', resp.status);
        }
      } catch (err) {
        status.textContent = 'IPC error: ' + err.message;
        console.error('[JS] fetch error:', err);
      }
    }

    goBtn.addEventListener('click', navigate);

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        navigate();
      }
    });
  </script>
</body>
</html>
